name: Build and Deploy .NET Project to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

env:
  DOTNET_VERSION: '10.0.x'
  AWS_REGION: us-east-1
  EB_APPLICATION_NAME: projeto-aspnet-aws
  EB_ENVIRONMENT_NAME: Projeto-aspnet-aws-env
  PACKAGE_NAME: projeto-aspnet-aws-${{ github.sha }}.zip

jobs:
  build:
    name: Build ProjetoAWS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restaurar dependências
        run: dotnet restore ProjetoAWS.slnx

      - name: Compilar projeto
        run: dotnet build ProjetoAWS.slnx --configuration Release --no-restore

      - name: Publicar aplicação
        run: dotnet publish ProjetoAWS/ProjetoAWS.csproj --configuration Release --output ./publish --no-build

      - name: Gerar pacote ZIP
        run: |
          cd publish
          zip -r ../${{ env.PACKAGE_NAME }} .

      - name: Salvar artefato do build
        uses: actions/upload-artifact@v4
        with:
          name: projeto-aspnet-aws-package
          path: ${{ env.PACKAGE_NAME }}

  deploy:
    name: Deploy to AWS Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: build

    if: github.event_name == 'push'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Baixar artefato do build
        uses: actions/download-artifact@v4
        with:
          name: projeto-aspnet-aws-package

      - name: Configurar credenciais da AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Gerar nome da versão
        run: echo "VERSION_LABEL=version-${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Criar bucket temporário para Elastic Beanstalk
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="elasticbeanstalk-${{ env.AWS_REGION }}-${ACCOUNT_ID}"
          echo "EB_BUCKET_NAME=${BUCKET_NAME}" >> $GITHUB_ENV

          if ! aws s3api head-bucket --bucket "${BUCKET_NAME}" 2>/dev/null; then
            aws s3api create-bucket --bucket "${BUCKET_NAME}" --region "${{ env.AWS_REGION }}"
          fi

      - name: Enviar pacote para o S3
        run: |
          aws s3 cp "${{ env.PACKAGE_NAME }}" "s3://${{ env.EB_BUCKET_NAME }}/${{ env.PACKAGE_NAME }}"

      - name: Criar versão da aplicação no Elastic Beanstalk
        run: |
          aws elasticbeanstalk create-application-version             --application-name "${{ env.EB_APPLICATION_NAME }}"             --version-label "${{ env.VERSION_LABEL }}"             --source-bundle S3Bucket="${{ env.EB_BUCKET_NAME }}",S3Key="${{ env.PACKAGE_NAME }}"

      - name: Fazer deploy no ambiente Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment             --environment-name "${{ env.EB_ENVIRONMENT_NAME }}"             --version-label "${{ env.VERSION_LABEL }}"

      - name: Aguardar finalização do deploy
        run: |
          aws elasticbeanstalk wait environment-updated             --environment-name "${{ env.EB_ENVIRONMENT_NAME }}"
