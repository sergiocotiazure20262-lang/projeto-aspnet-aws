name: Build .NET Project

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build ProjetoAWS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restaurar dependências
        run: dotnet restore ProjetoAWS.slnx

      - name: Compilar projeto
        run: dotnet build ProjetoAWS.slnx --configuration Release --no-restore

      - name: Executar testes
        run: dotnet test ProjetoAWS.slnx --configuration Release --no-build --verbosity normal
        continue-on-error: true
